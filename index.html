<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Borel&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Quicksand:wght@300..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Quicksand:wght@300..700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <footer class="footer1">
        <img src="task.png" alt="" srcset="">
        <h1 class="titulo">Gerenciador de Tarefas</h1> 
        
    </footer>
      
<section class="containerPai"> 
    <section class="container">
        <br> <label for="name">Insira o nome da tarefa:</label> <br> 
        <input type="text" id="name" placeholder="Nome da tarefa"><br> <br>

        <label for="">Insira a data de vencimento:</label> <br>
        <input type="date" id="dateV"> <br> <br>

        <label for="category">Insira a categoria da tarefa:</label> <br>  
        <select name="" id="category"> 
            <option value="">Selecione uma categoria</option>
            <option value="Trabalho">Trabalho</option>
            <option value="Pessoal">Pessoal</option>
            <option value="Estudo">Estudo</option>
            <option value="Casa">Casa</option>
        </select> <br> <br>
        <button id="addTask" onclick="addTask()">Adicionar Tarefa</button> <br>
        <button id="exibirTask" onclick="exibirTarefa()">Exibir Tarefa</button> <br>
        <button id="deleteTask" onclick="Excluirtarefa()">Excluir Tarefas</button>
    </section>

    <script>

        let lista = JSON.parse(localStorage.getItem('lista')) || [];  

        function addTask() { 

            // Declarar as primeiras váriaveis para pegar dados do input

            let name = document.getElementById('name').value;
            let category = document.getElementById('category').value;
            let dateV = document.getElementById('dateV').value;

            // Se os campos estiverem vazios, exibir alerta

            if (name === "" || category === "" || dateV === "") {
                alert('Por favor preencha todos os campos!');
                return;
            }

            // Armazenar dados no LocalStorage

            localStorage.setItem('name', name);
            localStorage.setItem('category', category);
            localStorage.setItem('dateV', dateV);

            // Declarar um array para armazenar as tarefas

            let novaTarefa = {
                name: name,
                category: category,
                dateV: dateV
            }

            // Chama com o push para chamar a função de adicionar a tarefa na lista e depois exibir a tarefa

            lista.push(novaTarefa);
            localStorage.setItem('lista', JSON.stringify(lista));

            // Limpa os campos para uma nova inserção de dados

            document.getElementById('name').value = "";
            document.getElementById('category').value = "";
            document.getElementById('dateV').value = "";

            alert('Tarefa adicionada!');

            // chama a função para exibir a tarefa na lista

            exibirTarefa()
        }
        function Excluirtarefa() {

            // Limpa a lista de tarefas para excluir as tarefas, exibindo um alerta para o user
            localStorage.clear();
            lista = [];
            
            exibirTarefa()

            alert('Tarefa excluída!');

            
        }
        function exibirTarefa() {

            // Declarar a váriavel para pegar o elemento da lista e exibir as tarefas
            let taskList = document.getElementById('taskList');
            taskList.innerHTML = "";
            lista.forEach(tarefa => {
                taskList.innerHTML += `<p class="listaTarefas">${tarefa.name} - ${tarefa.category} - ${tarefa.dateV}</p>`
            })
        }
    </script>

    <section class="container">
        <div class="imgicon">
        <h2>Lista de Tarefas</h2>
        <img src="check.png" alt="">
        </div>
        <p>Nome - Categoria - Data de Vencimento</p> <br>
        <p id="taskList"></p> </section>
    </section>

</section>
